name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 🔑 NECESARIO (antes no lo tenías)
      - name: Checkout repo
        uses: actions/checkout@v4

      # 👾 Generar pacman
      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: MatiDroid21

      # 🧪 Debug (opcional pero recomendado)
      - name: Debug dist
        run: |
          echo "Contenido de dist:"
          ls -la dist || echo "dist no existe"

      # 🚀 Deploy moderno (reemplaza crazy-max)
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
